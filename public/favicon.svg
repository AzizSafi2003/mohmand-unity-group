<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Mohmand Unity Group">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#235641"/>
      <stop offset="1" stop-color="#1E4D3B"/>
    </linearGradient>
  </defs>
  <!-- pine rounded tile -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- kilim diamonds -->
  <path d="M32 8 56 32 32 56 8 32Z" fill="none" stroke="#B8893B" stroke-width="2.4"/>
  <path d="M32 16 48 32 32 48 16 32Z" fill="none" stroke="#EFEDE3" stroke-opacity="0.5" stroke-width="1.4"/>
  <!-- lineage tree: root splits to two, then to four -->
  <g stroke="#EFEDE3" stroke-width="2.6" stroke-linecap="round" fill="none">
    <line x1="32" y1="46" x2="32" y2="36"/>
    <line x1="32" y1="36" x2="23" y2="27"/>
    <line x1="32" y1="36" x2="41" y2="27"/>
    <line x1="23" y1="27" x2="19" y2="21"/>
    <line x1="23" y1="27" x2="27" y2="21"/>
    <line x1="41" y1="27" x2="37" y2="21"/>
    <line x1="41" y1="27" x2="45" y2="21"/>
  </g>
  <!-- brass nodes -->
  <g fill="#D7A94B">
    <circle cx="32" cy="47" r="3.1"/>
    <circle cx="19" cy="20" r="2.6"/>
    <circle cx="27" cy="20" r="2.6"/>
    <circle cx="37" cy="20" r="2.6"/>
    <circle cx="45" cy="20" r="2.6"/>
  </g>
</svg>
